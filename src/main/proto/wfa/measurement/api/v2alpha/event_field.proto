syntax = "proto3";

package wfa.measurement.api.v2alpha;

import "google/api/resource.proto";
import "wfa/measurement/api/v2alpha/field_schema.proto";

option java_package = "org.wfanet.measurement.api.v2alpha";
option java_multiple_files = true;
option java_outer_classname = "EventFieldProto";

// A property of an event.
message EventField {
  option (google.api.resource) = {
    type: "halo.wfanet.org/EventField"
    pattern: "eventFields/{event_field}"
    pattern: "dataProviders/{data_provider}/eventFields/{event_field}"
  };

  // Resource name.
  string name = 1;

  // Human-readable name of this `EventField`.
  string display_name = 2;

  // Optional human-readable description of this `EventField`.
  string description = 3;

  // Schema that describes the type of this `EventField`'s value.
  FieldValueType value_type = 4;
}
