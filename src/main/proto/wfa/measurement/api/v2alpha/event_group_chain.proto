syntax = "proto3";

package wfa.measurement.api.v2alpha;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/struct.proto";
import "wfa/measurement/api/v2alpha/event_group.proto";

option java_package = "org.wfanet.measurement.api.v2alpha";
option java_multiple_files = true;
option java_outer_classname = "EventGroupChainProto";
option go_package = "github.com/world-federation-of-advertisers/cross-media-measurement/cmms/apiv2alpha/cmmspb";

// A merged chain of [EventGroup][]s from root to leaf.
message EventGroupChain {
  option (google.api.resource) = {
    type: "halo.wfanet.org/EventGroupChain"
    pattern: "dataProviders/{data_provider}/eventGroupChains/{event_group_chain}"
    pattern: "measurementConsumers/{measurement_consumer}/eventGroupChains/{event_group_chain}"
    singular: "eventGroupChain"
    plural: "eventGroupChains"
  };

  // Resource name.
  //
  // Canonical format:
  // dataProviders/{data_provider}/eventGroupChains/{event_group_chain}
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // The chain of entities this [EventGroupChain][] represents from root to
  // leaf.
  //
  // The equivalent string representation of this field is alternating segments
  // of {entity_type} and {entity_id} delimited by the slash (`/`) character,
  // where {entity_type} is the documented string representation of the
  // [EventGroup.EntityType][]. For example, `campaigns/1234/lineItems/5678`.
  repeated EventGroup.EntityKey entity_path = 2
      [(google.api.field_behavior) = REQUIRED];

  // Resource names of the [EventGroup][]s making up this chain from root to
  // leaf.
  repeated string event_group_path = 3 [
    (google.api.resource_reference).type = "halo.wfanet.org/EventGroup",
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Metadata for each [EventGroup][] making up this chain from root to leaf.
  repeated google.protobuf.Struct entity_metadata = 4;
}
