syntax = "proto3";

package wfa.measurement.api.v2alpha;

import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option java_package = "org.wfanet.measurement.api.v2alpha";
option java_multiple_files = true;
option java_outer_classname = "EdpImpressionValidationProto";
option go_package = "github.com/world-federation-of-advertisers/cross-media-measurement/cmms/apiv2alpha/cmmspb";

// Request sent to an EDP's validation cloud function.
// One request per (entity key union, time interval, filter) combination.
message EdpImpressionValidationRequest {
  // Unique request ID for idempotency and correlation.
  string request_id = 1;

  // The EDP this request is for.
  string data_provider_name = 2;

  // The query to compute impressions for.
  ImpressionQuery query = 3;
}

// A single impression query.
message ImpressionQuery {
  // Entity keys to look up (treated as union).
  // Impressions are computed across all entity keys combined.
  repeated EntityKey entity_keys = 1;

  // The time interval for the measurement.
  TimeInterval time_interval = 2;

  // The impression qualification filter applied.
  // If unset, this is an unfiltered query.
  ImpressionQualificationFilter filter = 3;

  // Demographic dimensions for this measurement slice.
  // If empty, this is an all-adults (total population) query.
  repeated DimensionGrouping dimensions = 4;
}

// Key of the entity in the DataProvider's system.
message EntityKey {
  // Type of the entity in the DataProvider's system.
  string entity_type = 1;

  // ID of the entity in the DataProvider's system.
  string entity_id = 2;
}

// Time interval for a measurement period.
message TimeInterval {
  // Inclusive start of the measurement period (UTC).
  google.protobuf.Timestamp start_time = 1;

  // Exclusive end of the measurement period (UTC).
  google.protobuf.Timestamp end_time = 2;
}

// Impression qualification filter for the query.
message ImpressionQualificationFilter {
  // Filter specification in the publisher's format.
  // If unset, this is an unfiltered query.
  google.protobuf.Struct filter_spec = 1;
}

// A demographic dimension grouping for a measurement slice.
message DimensionGrouping {
  // Dimension path (e.g. "common.sex", "common.age_group").
  string path = 1;

  // Dimension value (e.g. "1", "2").
  string value = 2;
}

// Response from the EDP's validation cloud function.
message EdpImpressionValidationResponse {
  // Echoed from request for correlation.
  string request_id = 1;

  oneof outcome {
    // The publisher's impression count for this query.
    ImpressionCount result = 2;

    // Why this query could not be computed.
    SkipDetail skipped = 3;
  }
}

// Publisher's impression count for a query.
message ImpressionCount {
  int64 value = 1;
}

// Detail about why a query was skipped.
message SkipDetail {
  SkipReason reason = 1;
  string detail = 2;
}

// Reasons a validation query could not be computed.
enum SkipReason {
  SKIP_REASON_UNSPECIFIED = 0;

  // The filter is not supported by this EDP's publisher API.
  FILTER_NOT_SUPPORTED = 1;

  // The campaign/entity was not found in the publisher's system.
  ENTITY_NOT_FOUND = 2;

  // Publisher API returned an error.
  API_ERROR = 3;

  // The demographic dimension is not supported by this EDP's publisher API.
  DIMENSION_NOT_SUPPORTED = 4;
}

// Configuration for all EDP validation post-processing.
message EdpValidationConfigs {
  // Key: "dataProviders/{data_provider_id}"
  map<string, EdpValidationConfig> configs = 1;
}

// Per-EDP validation configuration.
message EdpValidationConfig {
  // HTTP endpoint for the EDP's cloud function.
  HttpEndpointSink endpoint = 1;

  // Tolerance thresholds.
  ToleranceConfig tolerance = 2;

  // Timeout for the cloud function call.
  google.protobuf.Duration request_timeout = 3;

  // Whether validation is enabled for this EDP.
  bool enabled = 4;

  // What to do when validation exceeds the failure threshold.
  FailurePolicy failure_policy = 5;
}

// HTTP endpoint for an EDP's cloud function.
message HttpEndpointSink {
  // The endpoint URI to trigger.
  string endpoint_uri = 1;

  // Application-specific config passed as JSON.
  google.protobuf.Struct app_params = 2;
}

// Tolerance thresholds for deviation between reported and publisher values.
message ToleranceConfig {
  // Deviation fraction that triggers WARNING (severe telemetry, report
  // continues). Default: 0.02 (2%).
  double warning_threshold_fraction = 1;

  // Deviation fraction that triggers FAILURE (may fail report per
  // FailurePolicy). Must be >= warning_threshold_fraction.
  // Default: 0.10 (10%).
  double failure_threshold_fraction = 2;

  // Skip validation below this count (avoids false failures on tiny
  // campaigns). Default: 1000.
  int64 minimum_impression_count = 3;

  // Statistical confidence multiplier for noise-aware tolerance.
  // Effective tolerance = max(threshold, k * sqrt(p*(1-p)/N)).
  // Default: 4.0.
  double noise_confidence_multiplier = 4;
}

// What to do when validation exceeds the failure threshold.
enum FailurePolicy {
  FAILURE_POLICY_UNSPECIFIED = 0;

  // Log + emit telemetry, report continues to noise correction.
  LOG_ONLY = 1;

  // Fail the report (transition to INVALID).
  FAIL_REPORT = 2;
}
