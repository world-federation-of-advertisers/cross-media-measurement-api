syntax = "proto3";

package wfa.measurement.api.v2alpha;

import "wfa/measurement/api/v2alpha/differential_privacy.proto";

option java_package = "org.wfanet.measurement.api.v2alpha";
option java_multiple_files = true;
option java_outer_classname = "MeasurementSpecProto";

// Specification for a `Measurement`. Immutable.
message MeasurementSpec {
  // Encryption public key for the `Measurement` that this `MeasurementSpec` is
  // associated with. Required.
  bytes measurement_public_key = 1;

  message ReachAndFrequency {
    // Differential privacy parameters for the global reach DP noise registers.
    //
    // Each of these registers contains: a random register ID which is outside
    // of the bounds of the normal ID space, the same constant key indicating
    // that the register is destroyed, and an arbitrary count value.
    DifferentialPrivacyParams global_reach_noise = 1;

    // Differential privacy parameters for noise tuples.
    //
    // The same value is used for both (0, R, R) and (R, R, R) tuples.
    DifferentialPrivacyParams global_frequency_noise = 2;
  }

  // Fields specific to the type of measurement.
  oneof measurement_type {
    ReachAndFrequency reach_and_frequency = 2;
  }
}
