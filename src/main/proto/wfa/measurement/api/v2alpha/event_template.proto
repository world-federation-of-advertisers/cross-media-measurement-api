syntax = "proto3";

package wfa.measurement.api.v2alpha;

import "google/api/resource.proto";

option java_package = "org.wfanet.measurement.api.v2alpha";
option java_multiple_files = true;
option java_outer_classname = "EventTemplateProto";

// Schema for some type of event. If an event conforms to an `EventTemplate`,
// then it is required to have the properties specified by the template.
//
// For example, an `EventTemplate` for a video ad might have a `duration`
// property, and so events conforming to that template would also be expected to
// have a `duration` property.
message EventTemplate {
  option (google.api.resource) = {
    type: "halo.wfanet.org/EventTemplate"
    pattern: "eventTemplates/{event_template}"
    pattern: "dataProviders/{data_provider}/eventTemplates/{event_template}"
  };

  // Resource name.
  string name = 1;

  // Human-readable name of this `EventTemplate`.
  string display_name = 2;

  // The fields belonging to this `EventTemplate`. Immutable.
  repeated string event_fields = 3 [(google.api.resource_reference).type =
      "halo.wfanet.org/EventField"];
}
